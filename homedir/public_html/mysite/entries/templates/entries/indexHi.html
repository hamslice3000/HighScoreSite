 <!doctype html>

 <html lang="en">
 
 <head>
    <meta charset="utf-8"> 
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
    <meta name="High Score"> 
    <!-- <link rel="stylesheet" href="css/style.css?v=1"> -->
 </head>


<body class="body" style="background-color:#25383C;">
  
<style type="text/css" media="screen">

    .high a{ 
        color: #FFFFFF;
        text-shadow: 0 0 0.5px #fff, 0 0 1px #fff, 0 0 2px #00ff00, 
        0 0 3px #00ff00, 0 0 5px #00ff00, 0 0 7px #00ff00, 
        0 0 15px #00ff00, 0 0 30px #00ff00, 0 0 50px #00ff00;  
        font-family:arial; 
        font-size: 18pt;
        font-weight:bold;
        text-decoration: none;
    }   
    ul {
        list-style-type: none;
        padding: 0 0px;
        margin: 0 0px;
    }    
    li {
        list-style-type: none;
    }  
    .table{
      display: inline-block;
      padding: 40px;
    }
  
 </style>
    
    <div id="hiTable" class = "table">
      {% for entry in high_entry_list %}
        <li><a href="/entries/{{ entry.id }}/"> <div class = "high" style = "text-align: left";>{{ entry.text }}&nbsp;&nbsp;&nbsp;&nbsp;<div style="float: right">{{ entry.score }}</div></a></li>
      {% endfor %}
     </div>
 
 <script>
 
  setTimeout(function() {
    $.ajax({      
        url: "",
        context: document.body,
        success: function(s,x){
            $(this).html(s);
        }
    });
   }, 1000);
   
 </script>

</body> 

</html>
