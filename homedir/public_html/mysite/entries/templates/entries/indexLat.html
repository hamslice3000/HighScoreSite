 <!doctype html>

 <html lang="en">
 
 <head>
    <meta charset="utf-8"> 
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
    <meta name="High Score"> 
    <!-- <link rel="stylesheet" href="css/style.css?v=1"> -->
 </head>


<body class="body" style="background-color:#25383C;">
  
<style type="text/css" media="screen">

    .latest a{ 
        color: #FFFFFF;
        text-shadow: 0 0 0.2px #fff, 0 0 0.3px #fff, 0 0 0.5px #00ffff, 
        0 0 1px #00ffff, 0 0 2px #00ffff, 0 0 5px #00ffff, 
        0 0 10px #00ffff, 0 0 10px #00ffff, 0 0 30px #00ffff;  
        font-family:arial; 
        font-size: 18pt;
        font-weight:bold;
        text-decoration: none;
        margin-left:auto; 
        margin-right:auto;
    }

    ul {
        list-style-type: none;
        padding: 0 0px;
        margin: 0 0px;
    }
    
    li {
        list-style-type: none;
    }
  
    .table{
      display: inline-block;
      padding: 40px;
    }
  
 </style>   

    <div id="latTable" class = "table">
      {% for entry in latest_entry_list %}
        <li><a href="/entries/{{ entry.id }}/"> <div class = "latest" style = "text-align: left";>{{ entry.text }}&nbsp;&nbsp;&nbsp;&nbsp;<div style="float: right">{{ entry.score }}</div></a></li>
      {% endfor %}
     </div>

 <script>
  setTimeout(function() {
    $.ajax({      
        url: "",
        context: document.body,
        success: function(s,x){
            $(this).html(s);
        }
    });
   }, 1000);
 </script>


</body> 

</html>
