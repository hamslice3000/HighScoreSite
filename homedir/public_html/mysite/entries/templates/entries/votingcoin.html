 <!doctype html>
 <html style="background-color: #25383C;">
 <html lang="en">
 
 <head>
    <meta charset="utf-8"> 
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
    <meta name="High Score Voting"> 
    <!--<link rel="stylesheet" href="css/style.css?v=1">-->
 </head>


<body class="body" style="background-color:#25383C;">
  

 <style type="text/css" media="screen"> <!--needed???-->
        
    ul {
        list-style-type: none;
        padding: 0 0px;
        margin: 0 0px;
    } 
    
    li {
        list-style-type: none;
    } 
    .vote a{ 
        color: #FFFFFF;
        text-shadow: 
        0 0 0.5px #fff, 
        0 0 1px #fff, 
        0 0 2px #ffff00, 
        0 0 5px #ffff00, 
        0 0 8px #ffff00, 
        0 0 10px #ffff00, 
        0 0 15px #ffff00, 
        0 0 20px #ffff00;  
        font-family:arial; 
        font-size: 72pt;
        font-weight:bold;
        text-decoration: none;
    }
    
    .transparent {
        opacity:0.01;
    }

    .tableCenter{
      margin: 20px 0;
      padding: 50px;
      clear: both;
      text-align: center;
      overflow:hidden;
      height:50%;
    }
    .table{
      display: inline-block;
      padding: 10px;
    }
    
 </style>

  <p>
  
  <div class = "tableCenter">
  
    <div class = "table">
      <div id="Vote" class = "vote" style="text-align: right">
      {% for entry in voting_entry %} 
        <li><a href="/entries/{{ entry.id }}/"><span id="entry-text">{{ entry.text }}</span> <span id="score">{{ entry.score }}</span></a></li>
        <p>
        <input type="submit" id="voteid" name='voteid' value="{{ entry.id }}" autofocus value="" onfocus="this.value = this.value;" class = "transparent"/>
              <script>
                $(document).ready(function() {
                var currentid = {{entry.id}}; //entry id is defined
                  $("#voteid").bind("keydown", function(e) {
                    if (e.keyCode == 38) {	//up arrow key
                      var args = {'voteid':currentid };	//current id is used
                      $.get("/votecoinup/", args).done(function(data) { //when .get is done, returns data from views(score)                   
                        $("#score").text(data); //span updates score with new value from views
                      });
                    return false;
                    }
                    if (e.keyCode == 40) { //down arrow key
                      var args = {'voteid':currentid };		//current id is used
                      $.get("/votecoindown/", args).done(function(data) { //when .get is done, returns data from views(score)  
                        $("#score").text(data);	//span updates score with new value from views
                      });
                    return false;
                    }
                    if(e.keyCode == 39) { //right key
                      var args = {'voteid':currentid };		//current id is used
                      $.get("/entryup/", args).done(function(data) {  //was/random-entry/
                        var parts = data.split(",");
                        $("#entry-text").text(parts[1]);
                        $("#score").text(parts[2]);
                        currentid = parts[0];
                      });
                     return false;
                     }
                    if(e.keyCode == 37) { //left key
                      var args = {'voteid':currentid };		//current id is used
                      $.get("/entrydown/", args).done(function(data) {
                        var parts = data.split(",");
                        $("#entry-text").text(parts[1]);
                        $("#score").text(parts[2]);
                        currentid = parts[0];
                      });
                     return false; 
                     }			
                  });
                });		
              </script>
         {% endfor %}
          </div>
      </div>
       
  </div>
    
</body> 
  
</html>
