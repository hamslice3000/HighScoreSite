      	<script>
          console.log("hi from js");
          $(document).ready(function() {
            $("#input").bind("keypress", function(e) { //input type=text above
              if (event.keyCode == 32) {
                 return false;
              }
              if (e.keyCode == 13) {
                var text = $("#input").val();	
                var args = {'text':text};
		var trimmedValue = jQuery.trim($('#input').val());
                if (trimmedValue.length > 0) {	
                  $.get("/add/", args).done(function(data) {
                    location.reload();	
                  });
                }
              return false;
              }	
            });
          });	
        </script>
